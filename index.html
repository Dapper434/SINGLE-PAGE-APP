<nav class="navbar px-4 py-3">
    <a class="navbar-brand" href="#">
        <i class="bi bi-book-half me-2"></i>

                    </div>

            </p>
        </div>

        
        <div id="placeholder-text" class="text-center py-5">

            </p>
